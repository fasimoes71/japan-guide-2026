const MONTH_ABBR = { '01':'JAN','02':'FEV','03':'MAR','04':'ABR','05':'MAI','06':'JUN','07':'JUL','08':'AGO','09':'SET','10':'OUT','11':'NOV','12':'DEZ' };
const CITY_PT = { tokyo:'Tokyo', hakone:'Hakone', kyoto:'Kyoto', nara:'Nara', osaka:'Osaka' };

function dateLabel(dateStr) {
  if (!dateStr || dateStr === '—') return dateStr || '—';
  const [d, m] = dateStr.split('/');
  return `${d} ${MONTH_ABBR[m] || m}`;
}

function daysUntil() {
  return Math.max(0, Math.ceil((new Date('2026-04-05') - new Date()) / 86400000));
}

function statusLabel(s) {
  if (s === 'booked') return 'RESERVADO';
  if (s === 'pending') return 'PENDENTE';
  return 'A FAZER';
}

function switchView(name) {
  currentView = name;
  // Close fullpage menu if open
  const menu = document.getElementById('fullpage-menu');
  const menuBtn = document.getElementById('header-menu-btn');
  if (menu && menu.classList.contains('open')) {
    menu.classList.remove('open');
    if (menuBtn) menuBtn.classList.remove('open');
  }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const viewEl = document.getElementById('view-' + name);
  if (viewEl) viewEl.classList.add('active');

  ['overview','cidades','dicas','reservas'].forEach(n => {
    const bnav = document.getElementById('bnav-' + n);
    if (bnav) bnav.classList.toggle('active', n === name);
    const dnav = document.getElementById('dnav-' + n);
    if (dnav) dnav.classList.toggle('active', n === name);
    const fmenu = document.getElementById('fmenu-' + n);
    if (fmenu) fmenu.classList.toggle('active-nav', n === name);
  });

  if (name === 'overview') renderOverview();
  if (name === 'reservas') renderReservas(currentReservasTab);
  if (name === 'cidades') renderCidades();
  if (name === 'dicas') renderDicasView();
}

function getTodayDayIndex() {
  const tripStart = new Date('2026-04-05');
  const today = new Date();
  today.setHours(0,0,0,0);
  tripStart.setHours(0,0,0,0);
  const diff = Math.floor((today - tripStart) / 86400000);
  return Math.max(0, Math.min(diff, days.length - 1));
}

function renderOverview() {
  const todayIdx = getTodayDayIndex();
  const dLeft = daysUntil();
  const tripStarted = new Date() >= new Date('2026-04-05');

  let html = '';

  // Countdown banner (before trip only)
  if (!tripStarted) {
    html += `<div class="s-row" style="cursor:pointer" onclick="showFlightModal()">
      <span>PARTIDA EM ${dLeft} DIAS · VER VOOS</span><div class="s-dot"></div>
    </div>`;
  }

  // Single unified list — current day is the big inline card
  days.forEach((d, i) => {
    const [day, month] = d.date.split('/');
    const monthAbbr = MONTH_ABBR[month] || month;
    const cityLabel = CITY_PT[d.city] || d.city;
    const summary = DAY_SUMMARIES[d.date] || '';
    const isToday = i === todayIdx;
    const isPast = i < todayIdx;
    const mainAct = d.activities[0];
    const mainActName = typeof mainAct === 'object' ? mainAct.t : (mainAct || '');

    if (isToday) {
      html += `<div class="day-hero" id="dp-current-day" onclick="openDayDetail(${i})">
        <div class="day-hero-date">
          <div class="day-hero-num">${day}</div>
          <div class="day-hero-month">${monthAbbr}</div>
          <div class="day-hero-wd">${d.weekday}</div>
        </div>
        <div class="day-hero-body">
          <div class="day-hero-title">${d.title}</div>
          ${summary ? `<div class="day-hero-summary">${summary}</div>` : ''}
          <div class="day-hero-main">↳ ${mainActName}</div>
        </div>
      </div>`;
    } else {
      html += `<div class="dp-row ${isPast ? 'dp-past' : ''}" onclick="openDayDetail(${i})">
        <div class="dp-date">
          <div class="dp-day">${day}</div>
          <div class="dp-month">${monthAbbr}</div>
          <div class="dp-wd">${d.weekday}</div>
        </div>
        <div class="dp-content">
          <div class="dp-title">${d.title}</div>
          <div class="dp-city">${cityLabel}</div>
          ${summary ? `<div class="dp-summary">${summary}</div>` : ''}
        </div>
        <div class="dp-arrow">›</div>
      </div>`;
    }
  });

  document.getElementById('overview-content').innerHTML = html;

  // Scroll current day into view
  setTimeout(() => {
    const el = document.getElementById('dp-current-day');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 80);
}

// FLIGHT MODAL
// ═══════════════════════════════════════
function showFlightModal() {
  const FLIGHT_PEOPLE = ['Fabio','Fernanda','Joaquim','Luisa'];
  const flightTickets = tickets.filter(t =>
    /AA \d+|voo/i.test(t.name) && t.details
  );

  let html = '';
  flightTickets.forEach(t => {
    // Parse seats from details string like "Fabio 15B · Fernanda 15D · Joaquim 15C · Luisa 15E"
    const seatMatches = [];
    FLIGHT_PEOPLE.forEach(p => {
      const re = new RegExp(p + '\\s+([A-Z0-9]+)', 'i');
      const m = t.details.match(re);
      if (m) seatMatches.push({ name: p, seat: m[1].toUpperCase() });
    });

    // Extract date + time info
    const metaParts = t.details.split('·').map(s => s.trim()).filter(Boolean);
    const datePart = metaParts[0] || '';
    const timePart = metaParts[1] || '';

    html += `<div class="flight-ticket">
      <div class="flight-ticket-route">${t.name}</div>
      <div class="flight-ticket-meta">${datePart}${timePart ? ' · ' + timePart : ''}</div>`;

    if (seatMatches.length) {
      html += `<div class="flight-seat-label">Assentos</div>
      <div class="flight-ticket-seats">`;
      seatMatches.forEach(s => {
        html += `<div class="flight-seat" title="${s.name}">${s.name.slice(0,3).toUpperCase()} ${s.seat}</div>`;
      });
      html += `</div>`;
    }

    if (t.link) {
      html += `<a href="${t.link}" target="_blank" rel="noopener" class="flight-ticket-link">Check-in / Detalhes →</a>`;
    }

    html += `</div>`;
  });

  if (!html) html = `<div style="padding:24px 20px;color:#888;font-size:13px">Nenhum voo encontrado.</div>`;

  document.getElementById('flight-modal-body').innerHTML = html;
  document.getElementById('flight-modal-overlay').classList.add('open');
  document.getElementById('flight-modal').classList.add('open');
}

function closeFlightModal() {
  document.getElementById('flight-modal-overlay').classList.remove('open');
  document.getElementById('flight-modal').classList.remove('open');
}

function renderMapView() {
  // Init Leaflet once
  if (!mapInstance) {
    mapInstance = L.map('map-container', { zoomControl: false }).setView([35.5, 136.5], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap, © CARTO',
      maxZoom: 18
    }).addTo(mapInstance);

    MAP_POINTS.forEach(p => {
      const icon = L.divIcon({
        html: `<div style="width:10px;height:10px;background:${p.color};border:2px solid #fff;border-radius:50%"></div>`,
        iconSize: [10, 10], className: ''
      });
      L.marker([p.lat, p.lng], { icon }).addTo(mapInstance)
        .bindTooltip(p.name, { permanent: false, direction: 'top' });
    });
  } else {
    setTimeout(() => mapInstance.invalidateSize(), 100);
  }

  // Render itinerary grid
  let html = '';
  days.forEach((d, i) => {
    const [day, month] = d.date.split('/');
    const monthAbbr = MONTH_ABBR[month] || month;
    const cityLabel = CITY_PT[d.city] || d.city;

    html += `<div class="mi-day" onclick="openDayDetail(${i})">
      <span>${day} ${monthAbbr} / ${d.weekday.toUpperCase()} — ${d.title}</span>
      <span style="font-size:10px;color:#888">${cityLabel}</span>
    </div>`;

    if (d.transport) {
      html += `<div class="mi-conn">↳ ${d.transport}</div>`;
    }

    d.activities.forEach((a, ai) => {
      const text = typeof a === 'string' ? a : a.t;
      const time = (typeof a === 'object' && a.time) ? a.time : '—';
      const loc = cityLabel;

      html += `<div class="mi-row" onclick="openDayDetail(${i})">
        <div class="mi-loc">
          <span>${loc}</span>
          <span class="mi-loc-time">${time}</span>
        </div>
        <div class="mi-name">${text}</div>
      </div>`;

      // Connector between activities (not after last)
      if (ai < d.activities.length - 1) {
        html += `<div class="mi-conn">· · ·</div>`;
      }
    });
  });

  document.getElementById('map-itinerary').innerHTML = html;
}

// HOTEL LOOKUP FOR DAY
// ═══════════════════════════════════════
function getHotelForDay(dayDate) {
  // dayDate is "DD/MM". Find the hotel where checkin <= dayDate < checkout
  function toNum(ddmm) {
    const p = (ddmm || '').split('/');
    const d = parseInt(p[0], 10) || 0;
    const m = parseInt(p[1], 10) || 0;
    return m * 100 + d;
  }
  const n = toNum(dayDate);
  return hotels.find(h => {
    const ci = toNum(h.checkin);
    const co = toNum(h.checkout);
    return n >= ci && n < co;
  }) || null;
}

function parseMinutes(timeStr) {
  if (!timeStr) return null;
  const m = timeStr.match(/(\d{1,2})h(\d{0,2})/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + (parseInt(m[2] || '0') || 0);
}

function timeDiff(t1, t2) {
  const m1 = parseMinutes(t1), m2 = parseMinutes(t2);
  if (!m1 || !m2 || m2 <= m1) return null;
  const diff = m2 - m1;
  return diff >= 60 ? `${Math.floor(diff/60)}h${diff%60 ? (diff%60)+'min' : ''}` : `${diff}min`;
}

function renderDayDetail(idx) {
  const d = days[idx];
  if (!d) return;

  const [day, month] = d.date.split('/');
  const monthAbbr = MONTH_ABBR[month] || month;
  const cityLabel = CITY_PT[d.city] || d.city;
  const summary = DAY_SUMMARIES[d.date] || '';
  document.getElementById('ds-datestr').textContent = `${day} ${monthAbbr}`;
  document.getElementById('ds-prev').disabled = idx === 0;
  document.getElementById('ds-next').disabled = idx === days.length - 1;

  let html = '';

  // Editorial hero title
  html += `<div class="day-editorial-hero">
    <div class="day-editorial-num">${day} ${monthAbbr} · ${cityLabel.toUpperCase()}</div>
    <div class="day-editorial-title">${d.title.toUpperCase()}</div>
    <hr class="day-editorial-rule">
    ${d.transport ? `<div class="day-editorial-desc">${d.transport}</div>` : ''}
  </div>`;

  // Hero photo placeholder (filled async after render)
  html += `<div class="day-hero-photo-wrap" id="day-hero-photo-wrap">
    <div class="day-hero-photo-placeholder" id="day-hero-placeholder">Carregando foto…</div>
    <img class="day-hero-photo-img" id="day-hero-img" alt="">
    <div class="day-hero-photo-credit" id="day-hero-credit"></div>
  </div>`;

  // Curator's note (summary)
  if (summary) {
    html += `<div style="padding:20px;border-bottom:1px solid #DDD9D3">
      <div style="border-left:2px solid #0A0A0A;padding-left:16px">
        <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:8px">NOTA DO CURADOR</div>
        <div style="font-size:14px;color:#0A0A0A;line-height:1.7;font-family:'Inter',sans-serif">${summary}</div>
      </div>
    </div>`;
  }

  // Get transit data for this day
  const transit = DAY_TRANSIT[d.date];
  
  // Hotel → first activity
  if (transit && transit.from_hotel) {
    html += `<div class="day-act-connector hotel-connector">
      <div class="day-act-connector-line"></div>
      <div class="day-act-connector-text">🏨 Hotel → ${transit.from_hotel}</div>
    </div>`;
  }

  // Day route button (Google Maps transit/metro)
  const stopList = d.activities
    .filter(a => typeof a === 'object' && a.t && !a.t.startsWith('Saída') && !a.t.startsWith('Almoço') && !a.t.startsWith('Jantar') && !a.t.startsWith('Check') && !a.t.startsWith('Voo') && !a.t.startsWith('Pausa'));
  const dayHotel = getHotelForDay(d.date);
  if (stopList.length >= 1) {
    const hotelOrigin = dayHotel ? encodeURIComponent(dayHotel.name + ' Japan') : null;
    const origin = hotelOrigin || encodeURIComponent(stopList[0].t + ' Japan');
    const destination = encodeURIComponent(stopList[stopList.length - 1].t + ' Japan');
    // if hotel is origin, all stops are waypoints; otherwise first stop is origin and rest are waypoints+destination
    const waypointList = hotelOrigin ? stopList.slice(0, -1) : stopList.slice(1, -1);
    const waypoints = waypointList.map(a => encodeURIComponent(a.t + ' Japan')).join('|');
    const routeUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}${waypoints ? `&waypoints=${waypoints}` : ''}&travelmode=transit`;
    html += `<a href="${routeUrl}" target="_blank" rel="noopener" class="day-route-btn">
      🚇 Ver Rota do Dia no Google Maps (metrô)
    </a>`;
  }

  if (editMode) html += `<div id="act-sortable-list">`;

  d.activities.forEach((a, ai) => {
    const text = typeof a === 'string' ? a : a.t;
    const time = (typeof a === 'object' && a.time) ? a.time : '—';
    const desc = (typeof a === 'object' && a.d) ? a.d.replace(/\n/g, '<br>') : '';
    const link = (typeof a === 'object' && a.l) ? a.l : '';
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(text + ' Japan')}`;
    const isNavActivity = text.startsWith('Saída') || text.startsWith('Voo') || text.startsWith('Almoço rápido') || text.startsWith('Check-in') || text.startsWith('Check-out');
    const isFlightActivity = text.startsWith('Voo');

    if (editMode) {
      const dayOptions = days.map((dd, di) => {
        const parts = (dd.date || '').split('/');
        const dayNum = parseInt(parts[0], 10) || '?';
        const mo = MONTH_ABBR[parts[1]] || '';
        return `<option value="${di}" ${di === idx ? 'selected' : ''}>${dayNum} ${mo}</option>`;
      }).join('');
      html += `<div class="day-act-row" data-ai="${ai}">
        <div class="day-act-time">${time}</div>
        <div class="day-act-name" style="display:flex;align-items:flex-start;gap:8px">
          <span class="drag-handle" title="Arrastar para reordenar">⠿</span>
          <div style="flex:1">
            <div class="day-act-title">${text}</div>
            ${desc ? `<div class="day-act-desc">${desc}</div>` : ''}
          </div>
          <div class="edit-act-controls">
            <button class="edit-ctrl-btn del" onclick="deleteActivity(${idx},${ai})" title="Remover">✕</button>
            <select class="edit-move-select" onchange="moveActivityToDay(${idx},${ai},this.value)">${dayOptions}</select>
          </div>
        </div>
      </div>`;
    } else {
      html += `<div class="day-act-row" ${isFlightActivity ? 'onclick="showFlightModal()" style="cursor:pointer"' : ''}>
        <div class="day-act-time">${time}</div>
        <div class="day-act-name">
          <div class="day-act-title">${text}</div>
          ${desc ? `<div class="day-act-desc">${desc}</div>` : ''}
          ${isFlightActivity ? `<div class="act-links"><span class="act-link-btn" style="cursor:pointer">✈ Ver assentos e detalhes</span></div>` : ''}
          ${!isNavActivity && !isFlightActivity ? `<div class="act-links">
            <a href="${mapsUrl}" target="_blank" rel="noopener" class="act-link-btn">🗺 Maps</a>
            ${link ? `<a href="${link}" target="_blank" rel="noopener" class="act-link-btn">🌐 Site</a>` : ''}
          </div>` : ''}
        </div>
      </div>`;

      // Transport connector to next activity (only in view mode)
      if (ai < d.activities.length - 1) {
        let connectorText = '';
        if (transit && transit.between && transit.between[ai]) {
          connectorText = transit.between[ai];
        } else {
          const nextA = d.activities[ai + 1];
          const nextTime = typeof nextA === 'object' ? nextA.time : null;
          const gap = timeDiff(time, nextTime);
          const transportMode = d.transport ? d.transport.split('·')[0].trim() : 'deslocamento';
          connectorText = gap ? `${gap} · ${transportMode}` : transportMode;
        }
        html += `<div class="day-act-connector">
          <div class="day-act-connector-line"></div>
          <div class="day-act-connector-text">→ ${connectorText}</div>
        </div>`;
      }
    }
  });

  if (editMode) {
    html += `</div>`; // close #act-sortable-list
    html += `<button class="edit-add-btn" onclick="openEditAddSheet()">+ Adicionar atividade</button>`;
  }

  // Last activity → Hotel  
  if (transit && transit.to_hotel) {
    html += `<div class="day-act-connector hotel-connector">
      <div class="day-act-connector-line"></div>
      <div class="day-act-connector-text">🏨 → Hotel · ${transit.to_hotel}</div>
    </div>`;
  }

  if (d.note) {
    html += `<div class="day-tip-row" style="background:#1A1A1A;color:#F0EDE9;margin-top:8px">
      <div class="day-tip-label" style="color:#888;">NOTA</div>
      <div class="day-tip-text">${d.note}</div>
    </div>`;
  }

  if (d.tip) {
    html += `<div class="day-tip-row" style="margin-top:8px">
      <div class="day-tip-label">DICA DO DIA</div>
      <div class="day-tip-text">${d.tip}</div>
    </div>`;
  }

  document.getElementById('day-slide-content').innerHTML = html;
  document.getElementById('day-slide').scrollTop = 0;
  loadDayHeroPhoto(d);
  if (editMode) initSortable(idx);
}

function switchCityGuide(city) {

function renderDicas() {
  let html = '';
  DICAS_DATA.forEach(section => {
    html += `<div class="dicas-section">
      <div class="dicas-section-header" onclick="toggleDicasSection('${section.id}')">

        <span class="dicas-section-title">${section.title}</span>

      </div>

      const bodyHtml = item.body.replace(/\n/g, '<br>');
      html += `<div class="dicas-item">
        <div class="dicas-item-heading">${item.heading}${item.link ? `<a href="${item.link}" target="_blank" rel="noopener" class="act-ext-link">↗</a>` : ''}</div>

function toggleDicasSection(id) {
  const body = document.getElementById('dicas-body-' + id);
  const chevron = document.getElementById('dicas-chevron-' + id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chevron) chevron.style.transform = open ? '' : 'rotate(90deg)';
}

function renderCidades() {
  const city = currentCityGuide;
  const cat = currentCityCat;
  const data = CITY_GUIDE_SECTIONS[city];
  let html = '';

  if (city === 'Dicas') { renderDicas(); return; }

  if (cat === 'explorar') {
    // Show EXPLORE_ITEMS filtered by city + all alternatives
    const cityItems = EXPLORE_ITEMS.filter(e => e.region === city || e.type === 'alternative');
    if (cityItems.length === 0) {
      html = '<div style="padding:32px 16px;color:#888;font-size:13px">Sem sugestões para explorar nesta cidade.</div>';
    } else {
      cityItems.forEach((item, i) => {
        const badge = item.type === 'alternative' ? item.region : city;
        html += `<div class="cg-item-row">
          <div class="cg-item-n">${String(i+1).padStart(2,'0')}</div>
          <div class="cg-item-body">
            <div class="cg-item-name">${item.name} <span class="cg-badge">${badge}</span></div>
            <div class="cg-item-desc">${item.desc}</div>
          </div>
        </div>`;
      });
    }
  } else if (!data || !data[cat] || data[cat].length === 0) {
    html = '<div style="padding:32px 16px;color:#888;font-size:13px">Em breve.</div>';
  } else if (cat === 'bairros') {
    data.bairros.forEach((b, i) => {
      html += `<div class="cg-bairro-row">
        <div class="s-row" style="border-top:${i===0?'none':'1px solid #DDD9D3'}"><span>${b.name.toUpperCase()}</span><div class="s-dot"></div></div>
        <div class="cg-bairro-body">
          <div class="cg-bairro-desc">${b.desc}</div>
          ${b.highlight ? `<div class="cg-bairro-highlight">↳ ${b.highlight}</div>` : ''}
        </div>
      </div>`;
    });
  } else {
    // comer, compras, cultura, hospedagem
    data[cat].forEach((item, i) => {
      const name = item.name;
      const desc = item.desc;
      const link = item.link || '';
      const nota = item.nota || item.cat || '';
      const status = item.status || '';
      html += `<div class="cg-item-row">
        <div class="cg-item-n">${String(i+1).padStart(2,'0')}</div>
        <div class="cg-item-body">
          <div class="cg-item-name">
            ${name}
            ${link ? `<a href="${link}" target="_blank" rel="noopener" class="act-ext-link">↗</a>` : ''}
            ${status === 'booked' ? '<span class="cg-badge cg-booked">RESERVADO</span>' : ''}
          </div>
          <div class="cg-item-desc">${desc}</div>
          ${nota ? `<div class="cg-item-nota">↳ ${nota}</div>` : ''}
        </div>
      </div>`;
    });
  }

  document.getElementById('cidades-content').innerHTML = html;
}

function findWikiArticle(text) {
  const lower = text.toLowerCase();
  for (const [kw, article] of WIKI_MAP) {
    if (lower.includes(kw)) return article;
  }
  return null;
}

async function fetchWikiPhoto(article) {
  if (photoCache[article] !== undefined) return photoCache[article];
  try {
    const res = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(article)}`,
      { headers: { 'Accept': 'application/json', 'Api-User-Agent': 'JapaoGuide/1.0' } }
    );
    const data = await res.json();
    // Use the original thumbnail URL without size modification
    const url = data.thumbnail?.source || null;
    photoCache[article] = url;
    return url;
  } catch(e) {
    photoCache[article] = null;
    return null;
  }
}

async function loadDayHeroPhoto(d) {
  const wrap = document.getElementById('day-hero-photo-wrap');
  const img = document.getElementById('day-hero-img');
  const placeholder = document.getElementById('day-hero-placeholder');
  const credit = document.getElementById('day-hero-credit');
  if (!wrap || !img) return;

  // Try local photo first
  const localFile = DAY_PHOTOS[d.date];
  if (localFile) {
    const localUrl = 'fotos/japan/' + localFile;
    img.onload = () => { img.classList.add('loaded'); if (placeholder) placeholder.style.display = 'none'; };
    img.onerror = () => { img.src = ''; }; // silently fail, no credit
    img.src = localUrl;
    if (credit) credit.textContent = '';
    return;
  }

  // Fallback: try each activity in the day until we find a Wikipedia photo
  for (const act of d.activities) {
    const text = typeof act === 'string' ? act : act.t;
    const article = findWikiArticle(text);
    if (article) {
      try {
        const url = await fetchWikiPhoto(article);
        if (url && document.getElementById('day-hero-img') === img) {
          img.referrerPolicy = 'no-referrer';
          img.crossOrigin = 'anonymous';
          img.onload = () => { img.classList.add('loaded'); if (placeholder) placeholder.style.display = 'none'; };
          img.onerror = () => { /* try next activity */ };
          img.src = url;
          if (credit) credit.textContent = article.replace(/_/g,' ');
          return;
        }
      } catch(e) {}
    }
  }
  // No photo found — hide placeholder gracefully
  if (placeholder) placeholder.textContent = '';
  if (wrap) wrap.style.height = '0'; wrap.style.borderBottom = 'none';
}

async function openPhotoModal(activityText, cityContext) {
  const overlay = document.getElementById('photo-overlay');
  const img = document.getElementById('photo-img');
  const loading = document.getElementById('photo-loading');
  const error = document.getElementById('photo-error');
  const caption = document.getElementById('photo-caption');
  const sub = document.getElementById('photo-sub');

  img.classList.remove('loaded');
  img.style.display = 'none';
  loading.style.display = 'block';
  error.style.display = 'none';
  caption.textContent = activityText;
  sub.textContent = cityContext || '';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  const article = findWikiArticle(activityText);
  if (!article) {
    loading.style.display = 'none';
    error.style.display = 'block';
    error.textContent = 'Sem foto disponível para esta atração';
    return;
  }

  const url = await fetchWikiPhoto(article);
  loading.style.display = 'none';

  if (!overlay.classList.contains('open')) return; // user closed

  if (url) {
    img.src = url;
    img.alt = activityText;
    img.style.display = 'block';
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => {
      img.style.display = 'none';
      error.style.display = 'block';
      error.textContent = 'Foto não carregou — tente novamente';
    };
    sub.textContent = `Foto: Wikipedia · ${article}`;
  } else {
    error.style.display = 'block';
    error.textContent = 'Sem foto disponível';
  }
}

function closePhotoModal() {
  document.getElementById('photo-overlay').classList.remove('open');
  document.getElementById('photo-img').src = '';
  document.body.style.overflow = '';
}

document.getElementById('photo-overlay').addEventListener('click', function(e) {

});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePhotoModal(); return; }
  const slideOpen = document.getElementById('day-slide').classList.contains('open');
  if (!slideOpen) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigateDay(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigateDay(-1); }
});

// Touch swipe for day detail
(function() {
  let touchStartX = 0, touchStartY = 0;
  const slide = document.getElementById('day-slide');
  slide.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  slide.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx) * 0.8) return; // too short or too vertical
    if (dx < 0) navigateDay(1);   // swipe left → next day
    else navigateDay(-1);          // swipe right → prev day
  }, { passive: true });
})();

function initSortable(dayIdx) {
  const list = document.getElementById('act-sortable-list');
  if (!list || typeof Sortable === 'undefined') return;
  Sortable.create(list, {
    animation: 150,
    handle: '.drag-handle',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: function(evt) {
      if (evt.oldIndex === evt.newIndex) return;
      const acts = days[dayIdx].activities;
      const moved = acts.splice(evt.oldIndex, 1)[0];
      acts.splice(evt.newIndex, 0, moved);
    }
  });
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('ds-edit-btn');
  if (btn) btn.classList.toggle('active', editMode);
  renderDayDetail(currentDayIndex);
}

function deleteActivity(dayIdx, actIdx) {
  days[dayIdx].activities.splice(actIdx, 1);
  renderDayDetail(dayIdx);
}

function moveActivityUpDown(dayIdx, actIdx, dir) {
  const acts = days[dayIdx].activities;
  const newIdx = actIdx + dir;
  if (newIdx < 0 || newIdx >= acts.length) return;
  const temp = acts[actIdx];
  acts[actIdx] = acts[newIdx];
  acts[newIdx] = temp;
  renderDayDetail(dayIdx);
}

function moveActivityToDay(fromDayIdx, actIdx, toDayIdxStr) {
  const toDayIdx = parseInt(toDayIdxStr, 10);
  if (toDayIdx === fromDayIdx) return;
  const act = days[fromDayIdx].activities.splice(actIdx, 1)[0];
  days[toDayIdx].activities.push(act);
  renderDayDetail(fromDayIdx);
}

function openEditAddSheet() {
  document.getElementById('ea-time').value = '';
  document.getElementById('ea-title').value = '';
  document.getElementById('ea-notes').value = '';
  document.getElementById('ea-link').value = '';
  document.getElementById('edit-add-overlay').classList.add('open');
  document.getElementById('edit-add-sheet').classList.add('open');
}

function closeEditAddSheet() {
  document.getElementById('edit-add-overlay').classList.remove('open');
  document.getElementById('edit-add-sheet').classList.remove('open');
}

function saveEditActivity() {
  const time = document.getElementById('ea-time').value.trim();
  const title = document.getElementById('ea-title').value.trim();
  const notes = document.getElementById('ea-notes').value.trim();
  const link = document.getElementById('ea-link').value.trim();
  if (!title) return;
  const newAct = { t: title };
  if (time) newAct.time = time;
  if (notes) newAct.d = notes;
  if (link) newAct.l = link;
  days[currentDayIndex].activities.push(newAct);
  closeEditAddSheet();
  renderDayDetail(currentDayIndex);
}
